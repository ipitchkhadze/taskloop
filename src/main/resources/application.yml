spring:
  application:
    name: tasklist-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskdb}
    username: ${SPRING_DATASOURCE_USERNAME:task}
    password: ${SPRING_DATASOURCE_PASSWORD:task}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        sort:
          sort-parameter: sort

lmstudio:
  base-url: ${LMSTUDIO_BASE_URL:http://localhost:1234/v1}
  # Имя модели как в LM Studio (Developer → например скопировать id). Можно задать через LMSTUDIO_MODEL.
  model: ${LMSTUDIO_MODEL:}
  api-key: ${LMSTUDIO_API_KEY:}
  connect-timeout-seconds: ${LMSTUDIO_CONNECT_TIMEOUT_SECONDS:10}
  timeout-seconds: ${LMSTUDIO_TIMEOUT_SECONDS:120}
  max-tokens: ${LMSTUDIO_MAX_TOKENS:2048}
  max-task-title-chars: ${LMSTUDIO_MAX_TASK_TITLE_CHARS:200}
  max-response-chars: ${LMSTUDIO_MAX_RESPONSE_CHARS:32000}
  max-advice-context-chars: ${LMSTUDIO_MAX_ADVICE_CONTEXT_CHARS:4000}

advice-rate-limit:
  enabled: ${ADVICE_RATE_LIMIT_ENABLED:true}
  requests-per-window: ${ADVICE_RATE_LIMIT_REQUESTS:30}
  window-seconds: ${ADVICE_RATE_LIMIT_WINDOW_SECONDS:60}

server:
  # Переопределение (Spring Boot): PowerShell: $env:SERVER_PORT=8081; .\mvnw.cmd spring-boot:run
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{correlationId:-}] %logger{36} - %msg%n"
